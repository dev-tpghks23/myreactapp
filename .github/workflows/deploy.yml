name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: EC2 접속 후 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/myreactapp

            git pull origin main

            docker stop myreactapp || true
            docker rm myreactapp || true

            docker build -t myreactapp .

            docker run -d \
              --name myreactapp \
              -p 80:3000 \
              --restart always \
              myreactapp

            docker image prune -f